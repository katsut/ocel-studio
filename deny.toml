[advisories]
version = 2

[licenses]
version = 2
# ocel-studio itself is Elastic-2.0 (publish = false); deny only checks dependencies.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # option-ext (via dirs): file-level weak copyleft, unmodified use only
    "MPL-2.0",
    # webpki-roots (via rustls): Mozilla CA bundle data, permissive
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# ocel-mine until its first crates.io release
allow-git = ["https://github.com/katsut/ocel-mine"]
